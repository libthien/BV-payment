{% extends "base.html" %}

{% block login_content %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi - VBQ Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF69B4;
        }
        body {
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);
            max-width: 500px;
        }
        .error-icon {
            font-size: 4rem;
            color: var(--primary-pink);
            margin-bottom: 20px;
        }
        h1 { color: #2D3436; margin-bottom: 15px; }
        p { color: #636E72; }
        .btn-primary {
            background: var(--primary-pink);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
        }
        .btn-primary:hover { background: #0A58CA; }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <h1>{{ error }}</h1>
        <p>Đã xảy ra lỗi. Vui lòng thử lại hoặc liên hệ quản trị viên.</p>
        <a href="{{ url_for('dashboard') if session.user else url_for('login') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> Về trang chủ
        </a>
    </div>
</body>
</html>
{% endblock %}
